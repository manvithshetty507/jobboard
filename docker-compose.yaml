version: "3.9"

services:
  redis:
    container_name: redis_container
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --loglevel warning
    volumes:
      - "./infra/volumes/redis:/data"

  mongodb:
    container_name: mongodb_container
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - "./infra/volumes/mongo:/data/db"

  mysql:
    container_name: mysql_container
    image: mysql:latest
    command: --default_authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_USER: jobber
      MYSQL_DATABASE: jobber_auth
      MYSQL_ROOT_PASSWORD: api
      MYSQL_PASSWORD: api
    ports:
      - "3306:3306"
    volumes:
      - "./infra/volumes/mysql:/var/lib/mysql"

  postgres:
    container_name: postgres_container
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: jobber
      POSTGRES_PASSWORD: api
      POSTGRES_DB: jobber_reviews
    ports:
      - "5432:5432"
    volumes:
      - "./infra/volumes/postgres:/var/lib/postgresql/data"

  rabbitmq:
    container_name: rabbitmq_container
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      # management ui port
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: jobber
      RABBITMQ_DEFAULT_PASS: api
    volumes:
      - "./infra/volumes/rabbitmq:/var/lib/rabbitmq"

  elasticsearch:
    container_name: elasticsearch_container
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Monitoring
      - xpack.monitoring.collection.enabled=true
      # Security enrollment
      - xpack.security.enrollment.enabled=true
      # API key authentication
      - xpack.security.authc.api_key.enabled=true
    ports:
      - "9200:9200"
    volumes:
      - "./infra/volumes/elasticsearch:/usr/share/elasticsearch/data"

  kibana:
    container_name: kibana_container
    image: docker.elastic.co/kibana/kibana:8.11.1
    restart: always
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

